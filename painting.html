<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffd89b">
    <title>Painting Tasks</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .walls { background-color: #ffefd5; }
        .ceilings { background-color: #d0f0c0; }
        .skirting { background-color: #ffe4b5; }
        .doors { background-color: #e6e6fa; }
        .radiators { background-color: #f5deb3; }
        .cupboards { background-color: #fffacd; }
        .upvc { background-color: #c1f0f6; }
        .tiles { background-color: #d8bfd8; }
        .floors { background-color: #fafad2; }
        .special { background-color: #e0cda9; }

        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Painting Tasks</h1>

    <div class="grid">
        <button class="btn walls" onclick="location.href='painting-results.html?task=walls'">Walls</button>
        <button class="btn ceilings" onclick="location.href='painting-results.html?task=ceilings'">Ceilings</button>

        <button class="btn skirting" onclick="location.href='painting-results.html?task=skirting'">Skirting Boards</button>
        <button class="btn doors" onclick="location.href='painting-results.html?task=doors'">Doors</button>

        <button class="btn radiators" onclick="location.href='painting-results.html?task=radiators'">Radiators</button>
        <button class="btn cupboards" onclick="location.href='painting-results.html?task=cupboards'">Kitchen Cupboards</button>

        <button class="btn upvc" onclick="location.href='painting-results.html?task=upvc'">UPVC Windows/Doors</button>
        <button class="btn tiles" onclick="location.href='painting-results.html?task=tiles'">Tiles</button>

        <button class="btn floors" onclick="location.href='painting-results.html?task=floors'">Floors</button>
        <button class="btn special" onclick="location.href='painting-results.html?task=special'">Special Surfaces</button>
    </div>

    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.error('SW failed:', err));
  }
</script>
</body>
</html>
