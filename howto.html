/* ============================================================
   HOW-TO PAGE LOGIC
   ============================================================ */

function getTaskFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("task");
}

function renderHowTo(taskKey) {
    const box = document.getElementById("howToBox");

    if (!taskKey || !howToData[taskKey]) {
        box.innerHTML = `
            <strong>Not Found</strong><br><br>
            The selected task could not be loaded.
        `;
        return;
    }

    const data = howToData[taskKey];

    let html = `<h2>${data.name}</h2>`;

    if (data.warnings && data.warnings.length > 0) {
        html += `<div class="section-title">Warnings</div><ul>`;
        data.warnings.forEach(w => html += `<li>${w}</li>`);
        html += `</ul>`;
    }

    if (data.tools && data.tools.length > 0) {
        html += `<div class="section-title">Tools Needed</div><ul>`;
        data.tools.forEach(t => html += `<li>${t}</li>`);
        html += `</ul>`;
    }

    if (data.steps && data.steps.length > 0) {
        html += `<div class="section-title">Steps</div><ol>`;
        data.steps.forEach(s => html += `<li>${s}</li>`);
        html += `</ol>`;
    }

    if (data.hints && data.hints.length > 0) {
        html += `<div class="section-title">Hints</div><ul>`;
        data.hints.forEach(h => html += `<li>${h}</li>`);
        html += `</ul>`;
    }

    box.innerHTML = html;
}

const taskKey = getTaskFromURL();
renderHowTo(taskKey);
