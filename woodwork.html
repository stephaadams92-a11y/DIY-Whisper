<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodwork Tasks</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        /* Two-column grid for woodwork tasks */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Bottom navigation row */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Base button style */
        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Individual colours for woodwork tasks */
        .studwalls { background-color: #ffefd5; }
        .joists { background-color: #d0f0c0; }
        .boxing { background-color: #ffe4b5; }
        .featurewalls { background-color: #e6e6fa; }
        .skirting { background-color: #f5deb3; }
        .architrave { background-color: #fffacd; }
        .doors { background-color: #c1f0f6; }
        .windowboards { background-color: #d8bfd8; }
        .kitchencupboards { background-color: #fafad2; }
        .floorboards { background-color: #e0cda9; }
        .flooringwoodwork { background-color: #ffd7ba; }
        .nosuitable { background-color: #f4cccc; }

        /* Navigation button colours */
        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Woodwork Tasks</h1>

    <div class="grid">
        <button class="btn studwalls" onclick="location.href='woodwork-results.html?task=studwalls'">Stud Walls & Framing</button>
        <button class="btn joists" onclick="location.href='woodwork-results.html?task=joists'">Joists & Structural Timber</button>

        <button class="btn boxing" onclick="location.href='woodwork-results.html?task=boxing'">Boxing‑In & Frames</button>
        <button class="btn featurewalls" onclick="location.href='woodwork-results.html?task=featurewalls'">Feature Walls</button>

        <button class="btn skirting" onclick="location.href='woodwork-results.html?task=skirting'">Skirting Boards</button>
        <button class="btn architrave" onclick="location.href='woodwork-results.html?task=architrave'">Architrave</button>

        <button class="btn doors" onclick="location.href='woodwork-results.html?task=doors'">Doors</button>
        <button class="btn windowboards" onclick="location.href='woodwork-results.html?task=windowboards'">Window Boards / Cills</button>

        <button class="btn kitchencupboards" onclick="location.href='woodwork-results.html?task=kitchencupboards'">Kitchen Cupboards</button>
        <button class="btn floorboards" onclick="location.href='woodwork-results.html?task=floorboards'">Floorboards</button>

        <button class="btn flooringwoodwork" onclick="location.href='woodwork-results.html?task=flooringwoodwork'">Flooring‑Related Woodwork</button>
        <button class="btn nosuitable" onclick="location.href='woodwork-results.html?task=nosuitable'">Not Suitable</button>
    </div>

    <!-- Bottom navigation row -->
    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.error('SW failed:', err));
  }
</script>
</body>
</html>
