<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiling Tasks</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        /* Two-column grid for tiling tasks */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Bottom navigation row */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Base button style */
        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Individual colours for tiling tasks */
        .walltiles { background-color: #ffefd5; }
        .floortiles { background-color: #d0f0c0; }
        .porcelain { background-color: #ffe4b5; }
        .largeformat { background-color: #e6e6fa; }
        .mosaic { background-color: #f5deb3; }
        .peelstick { background-color: #fffacd; }
        .overtile { background-color: #c1f0f6; }
        .freshplaster { background-color: #d8bfd8; }
        .plasterboard { background-color: #fafad2; }
        .uneven { background-color: #e0cda9; }
        .stone { background-color: #ffd7ba; }
        .nosuitable { background-color: #f4cccc; }

        /* Navigation button colours */
        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Tiling Tasks</h1>

    <div class="grid">
        <button class="btn walltiles" onclick="location.href='tiling-results.html?task=walltiles'">Standard Wall Tiles</button>
        <button class="btn floortiles" onclick="location.href='tiling-results.html?task=floortiles'">Standard Floor Tiles</button>

        <button class="btn porcelain" onclick="location.href='tiling-results.html?task=porcelain'">Porcelain Tiles</button>
        <button class="btn largeformat" onclick="location.href='tiling-results.html?task=largeformat'">Large‑Format Tiles</button>

        <button class="btn mosaic" onclick="location.href='tiling-results.html?task=mosaic'">Mosaic Tiles</button>
        <button class="btn peelstick" onclick="location.href='tiling-results.html?task=peelstick'">Peel‑and‑Stick Tiles</button>

        <button class="btn overtile" onclick="location.href='tiling-results.html?task=overtile'">Tiling Over Tiles</button>
        <button class="btn freshplaster" onclick="location.href='tiling-results.html?task=freshplaster'">Over Fresh Plaster</button>

        <button class="btn plasterboard" onclick="location.href='tiling-results.html?task=plasterboard'">Over Plasterboard</button>
        <button class="btn uneven" onclick="location.href='tiling-results.html?task=uneven'">Uneven Surfaces</button>

        <button class="btn stone" onclick="location.href='tiling-results.html?task=stone'">Natural Stone Tiles</button>
        <button class="btn nosuitable" onclick="location.href='tiling-results.html?task=nosuitable'">Not Suitable</button>
    </div>

    <!-- Bottom navigation row -->
    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>

</body>
</html>
