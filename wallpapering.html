<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpapering Tasks</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        /* Two-column grid for wallpaper tasks */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Bottom navigation row */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Base button style */
        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Individual colours for wallpaper tasks */
        .standard { background-color: #ffefd5; }
        .pastewall { background-color: #d0f0c0; }
        .peelstick { background-color: #ffe4b5; }
        .feature { background-color: #e6e6fa; }
        .borders { background-color: #f5deb3; }
        .ceilings { background-color: #fffacd; }
        .overexisting { background-color: #c1f0f6; }
        .lining { background-color: #d8bfd8; }
        .bareplaster { background-color: #fafad2; }
        .problems { background-color: #e0cda9; }
        .nosuitable { background-color: #ffd7ba; }

        /* Navigation button colours */
        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Wallpapering Tasks</h1>

    <div class="grid">
        <button class="btn standard" onclick="location.href='wallpapering-results.html?task=standard'">Standard Wallpaper</button>
        <button class="btn pastewall" onclick="location.href='wallpapering-results.html?task=pastewall'">Paste‑the‑Wall</button>

        <button class="btn peelstick" onclick="location.href='wallpapering-results.html?task=peelstick'">Peel‑and‑Stick</button>
        <button class="btn feature" onclick="location.href='wallpapering-results.html?task=feature'">Feature Wall</button>

        <button class="btn borders" onclick="location.href='wallpapering-results.html?task=borders'">Borders</button>
        <button class="btn ceilings" onclick="location.href='wallpapering-results.html?task=ceilings'">Ceilings</button>

        <button class="btn overexisting" onclick="location.href='wallpapering-results.html?task=overexisting'">Over Existing</button>
        <button class="btn lining" onclick="location.href='wallpapering-results.html?task=lining'">Lining Paper</button>

        <button class="btn bareplaster" onclick="location.href='wallpapering-results.html?task=bareplaster'">Bare Plaster</button>
        <button class="btn problems" onclick="location.href='wallpapering-results.html?task=problems'">Problem Surfaces</button>

        <button class="btn nosuitable" onclick="location.href='wallpapering-results.html?task=nosuitable'">Not Suitable</button>
    </div>

    <!-- Bottom navigation row -->
    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>

</body>
</html>
