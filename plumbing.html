<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffd89b">
    <title>Plumbing Tasks</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        /* Two-column grid for plumbing tasks */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Bottom navigation row */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Base button style */
        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Individual colours for plumbing tasks */
        .unblock { background-color: #ffefd5; }
        .slowdrains { background-color: #d0f0c0; }
        .traps { background-color: #ffe4b5; }
        .leakingtaps { background-color: #e6e6fa; }
        .replacetaps { background-color: #f5deb3; }
        .toiletrepairs { background-color: #fffacd; }
        .toiletseat { background-color: #c1f0f6; }
        .bleeding { background-color: #d8bfd8; }
        .radvalves { background-color: #fafad2; }
        .appliances { background-color: #e0cda9; }
        .sealing { background-color: #ffd7ba; }
        .nosuitable { background-color: #f4cccc; }

        /* Navigation button colours */
        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Plumbing Tasks</h1>

    <div class="grid">
        <button class="btn unblock" onclick="location.href='plumbing-results.html?task=unblock'">Unblocking Sinks, Baths & Basins</button>
        <button class="btn slowdrains" onclick="location.href='plumbing-results.html?task=slowdrains'">Fixing Slow Drains</button>

        <button class="btn traps" onclick="location.href='plumbing-results.html?task=traps'">Leaking Traps & Waste Pipes</button>
        <button class="btn leakingtaps" onclick="location.href='plumbing-results.html?task=leakingtaps'">Fixing Leaking Taps</button>

        <button class="btn replacetaps" onclick="location.href='plumbing-results.html?task=replacetaps'">Replacing Taps</button>
        <button class="btn toiletrepairs" onclick="location.href='plumbing-results.html?task=toiletrepairs'">Toilet Repairs</button>

        <button class="btn toiletseat" onclick="location.href='plumbing-results.html?task=toiletseat'">Toilet Seat Replacement</button>
        <button class="btn bleeding" onclick="location.href='plumbing-results.html?task=bleeding'">Radiator Bleeding</button>

        <button class="btn radvalves" onclick="location.href='plumbing-results.html?task=radvalves'">Radiator Valve Replacement</button>
        <button class="btn appliances" onclick="location.href='plumbing-results.html?task=appliances'">Washing Machines & Dishwashers</button>

        <button class="btn sealing" onclick="location.href='plumbing-results.html?task=sealing'">Sealing & Waterproofing</button>
        <button class="btn nosuitable" onclick="location.href='plumbing-results.html?task=nosuitable'">Not Suitable</button>
    </div>

    <!-- Bottom navigation row -->
    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.error('SW failed:', err));
  }
</script>
</body>
</html>
