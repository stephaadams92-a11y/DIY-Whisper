<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the House Tasks</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        /* Two-column grid for around-the-house tasks */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Bottom navigation row */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Base button style */
        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Individual colours for around-the-house tasks */
        .shelves { background-color: #ffefd5; }
        .pictures { background-color: #d0f0c0; }
        .curtains { background-color: #ffe4b5; }
        .flatpack { background-color: #e6e6fa; }
        .hinges { background-color: #f5deb3; }
        .tricklevents { background-color: #fffacd; }
        .measuring { background-color: #c1f0f6; }
        .rails { background-color: #d8bfd8; }
        .holes { background-color: #fafad2; }
        .nosuitable { background-color: #ffd7ba; }

        /* Navigation button colours */
        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Around the House</h1>

    <div class="grid">
        <button class="btn shelves" onclick="location.href='around-the-house-results.html?task=shelves'">Putting Up Shelves</button>
        <button class="btn pictures" onclick="location.href='around-the-house-results.html?task=pictures'">Hanging Pictures & Mirrors</button>

        <button class="btn curtains" onclick="location.href='around-the-house-results.html?task=curtains'">Curtain Poles & Blinds</button>
        <button class="btn flatpack" onclick="location.href='around-the-house-results.html?task=flatpack'">Flat Pack Furniture</button>

        <button class="btn hinges" onclick="location.href='around-the-house-results.html?task=hinges'">WD‑40 & Minor Hinges</button>
        <button class="btn tricklevents" onclick="location.href='around-the-house-results.html?task=tricklevents'">Changing Trickle Vents</button>

        <button class="btn measuring" onclick="location.href='around-the-house-results.html?task=measuring'">Measuring Up</button>
        <button class="btn rails" onclick="location.href='around-the-house-results.html?task=rails'">Rails & Hooks</button>

        <button class="btn holes" onclick="location.href='around-the-house-results.html?task=holes'">Filling Tiny Holes</button>
        <button class="btn nosuitable" onclick="location.href='around-the-house-results.html?task=nosuitable'">Not Suitable</button>
    </div>

    <!-- Bottom navigation row -->
    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.error('SW failed:', err));
  }
</script>
</body>
</html>
