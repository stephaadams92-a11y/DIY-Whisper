<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plastering & Walls</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd89b, #6dd5fa);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 35px;
            font-size: 28px;
            color: #333;
        }

        /* Two-column grid for plastering tasks */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Bottom navigation row */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Base button style */
        .btn {
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Individual colours for plastering tasks */
        .smallrepairs { background-color: #ffefd5; }
        .mediumrepairs { background-color: #d0f0c0; }
        .largerepairs { background-color: #ffe4b5; }
        .fullskim { background-color: #e6e6fa; }
        .plasterboard { background-color: #f5deb3; }
        .taping { background-color: #fffacd; }
        .dampstain { background-color: #c1f0f6; }
        .removeplaster { background-color: #d8bfd8; }
        .levelling { background-color: #fafad2; }
        .nosuitable { background-color: #ffd7ba; }

        /* Navigation button colours */
        .nav-btn { background-color: #ffffff; width: 30%; }

        footer {
            margin-top: auto;
            margin-bottom: 15px;
            font-size: 13px;
            color: #333;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Plastering & Walls</h1>

    <div class="grid">
        <button class="btn smallrepairs" onclick="location.href='plastering-results.html?task=smallrepairs'">Small Filler Repairs</button>
        <button class="btn mediumrepairs" onclick="location.href='plastering-results.html?task=mediumrepairs'">Medium Repairs</button>

        <button class="btn largerepairs" onclick="location.href='plastering-results.html?task=largerepairs'">Large Repairs</button>
        <button class="btn fullskim" onclick="location.href='plastering-results.html?task=fullskim'">Full Skim Coat</button>

        <button class="btn plasterboard" onclick="location.href='plastering-results.html?task=plasterboard'">Plasterboard Installation</button>
        <button class="btn taping" onclick="location.href='plastering-results.html?task=taping'">Taping & Jointing</button>

        <button class="btn dampstain" onclick="location.href='plastering-results.html?task=dampstain'">Damp & Stain Treatment</button>
        <button class="btn removeplaster" onclick="location.href='plastering-results.html?task=removeplaster'">Removing Old Plaster</button>

        <button class="btn levelling" onclick="location.href='plastering-results.html?task=levelling'">Levelling Walls</button>
        <button class="btn nosuitable" onclick="location.href='plastering-results.html?task=nosuitable'">Not Suitable</button>
    </div>

    <!-- Bottom navigation row -->
    <div class="nav-row">
        <button class="btn nav-btn" onclick="location.href='index.html'">Home</button>
        <button class="btn nav-btn" onclick="location.href='menu.html'">Menu</button>
        <button class="btn nav-btn" onclick="location.href='notes.html'">Notes</button>
    </div>

    <footer>Only continue if you feel confident and capable.</footer>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.error('SW failed:', err));
  }
</script>
</body>
</html>
